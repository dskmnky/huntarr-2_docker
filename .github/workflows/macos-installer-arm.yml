name: macOS Installer Build (ARM arm64)

permissions:
  contents: write

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Prevent duplicate runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-arm-installer:
    name: Build macOS ARM Installer
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.1.0,<7" rumps pyobjc-framework-ServiceManagement
      
      - name: Extract metadata
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "IS_TAG=true" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT
            echo "IS_TAG=false" >> $GITHUB_OUTPUT
          fi

      - name: Create app icon
        run: |
          mkdir -p icon.iconset
          for size in 16 32 64 128 256 512; do
            src="frontend/static/logo/${size}.png"
            if [ -f "$src" ]; then
              cp "$src" "icon.iconset/icon_${size}x${size}.png"
            fi
          done
          # Create @2x variants
          [ -f icon.iconset/icon_32x32.png ] && cp icon.iconset/icon_32x32.png icon.iconset/icon_16x16@2x.png
          [ -f icon.iconset/icon_64x64.png ] && cp icon.iconset/icon_64x64.png icon.iconset/icon_32x32@2x.png
          [ -f icon.iconset/icon_256x256.png ] && cp icon.iconset/icon_256x256.png icon.iconset/icon_128x128@2x.png
          [ -f icon.iconset/icon_512x512.png ] && cp icon.iconset/icon_512x512.png icon.iconset/icon_256x256@2x.png
          iconutil -c icns icon.iconset -o huntarr.icns 2>/dev/null || \
            cp /System/Library/CoreServices/CoreTypes.bundle/Contents/Resources/GenericApplicationIcon.icns huntarr.icns

      - name: Create PyInstaller spec
        run: |
          cat > huntarr-2-macos.spec << 'SPECEOF'
          # -*- mode: python ; coding: utf-8 -*-
          import sys
          from PyInstaller.building.api import PYZ, EXE, COLLECT
          from PyInstaller.building.build_main import Analysis
          
          if sys.platform == 'darwin':
              try:
                  from PyInstaller.building.api import BUNDLE
              except ImportError:
                  try:
                      from PyInstaller.building.osx import BUNDLE
                  except ImportError:
                      from PyInstaller.utils.osx import BUNDLE
          
          a = Analysis(
              ['src/app_launcher.py'],
              pathex=['.'],
              datas=[
                  ('frontend', 'frontend'),
                  ('version.txt', '.'),
                  ('LICENSE', '.'),
                  ('src', 'src'),
                  ('resources', 'resources'),
              ],
              hiddenimports=[
                  'flask', 'flask.json', 'requests', 'waitress', 'bcrypt',
                  'qrcode', 'PIL', 'pyotp', 'rumps', 'Foundation', 'AppKit',
                  'ServiceManagement', 'objc', 'apprise', 'markdown', 'yaml',
                  'src.primary.desktop_tray', 'src.primary.macos_menubar',
              ],
              hookspath=[],
              runtime_hooks=[],
          )
          
          pyz = PYZ(a.pure, a.zipped_data)
          
          exe = EXE(
              pyz, a.scripts, [],
              exclude_binaries=True,
              name='Huntarr-2',
              debug=False,
              strip=False,
              upx=True,
              console=False,
              icon='huntarr.icns',
          )
          
          coll = COLLECT(
              exe, a.binaries, a.zipfiles, a.datas,
              strip=False, upx=True, name='Huntarr-2',
          )
          
          app = BUNDLE(
              coll,
              name='Huntarr-2.app',
              icon='huntarr.icns',
              bundle_identifier='io.huntarr2.app',
              info_plist={
                  'CFBundleShortVersionString': '${{ steps.meta.outputs.VERSION }}',
                  'CFBundleVersion': '${{ steps.meta.outputs.VERSION }}',
                  'NSHighResolutionCapable': True,
                  'LSUIElement': False,
              },
          )
          SPECEOF

      - name: Build macOS app
        run: python -m PyInstaller huntarr-2-macos.spec --clean --noconfirm

      - name: Create PKG installer
        run: |
          VERSION="${{ steps.meta.outputs.VERSION }}"
          
          # Create postinstall script
          mkdir -p scripts
          cat > scripts/postinstall << 'POSTEOF'
          #!/bin/bash
          mkdir -p "$HOME/Library/Application Support/Huntarr-2/config/logs"
          chmod -R 755 "$HOME/Library/Application Support/Huntarr-2"
          exit 0
          POSTEOF
          chmod +x scripts/postinstall
          
          # Build PKG
          pkgbuild --root dist/ \
                   --scripts scripts/ \
                   --identifier io.huntarr2.app \
                   --version ${VERSION} \
                   --install-location /Applications \
                   Huntarr-2-${VERSION}-mac-arm64.pkg
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: huntarr-2-macos-arm64-installer
          path: '*.pkg'
          retention-days: 30
      
      - name: Upload to release
        if: steps.meta.outputs.IS_TAG == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: '*.pkg'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
