# Mult-arch support

name: Sync, Build, and Push Huntarr-2 to GHCR

on:
  schedule:
    - cron: "0 0 * * *"     # Daily upstream check
    - cron: "5 0 * * 0"     # Weekly base-image check
  workflow_dispatch:

jobs:
  sync_and_build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your fork
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure merge driver for README
      run: |
        git config merge.ours.driver true

    - name: Configure Git identity
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Add upstream remote
      run: |
        git remote add upstream https://github.com/xtamtamx/huntarr-2.git
        git fetch upstream

    - name: Merge upstream changes
      id: merge
      run: |
        git merge upstream/main --allow-unrelated-histories || true

        if git diff --quiet; then
          echo "upstream_changed=false" >> $GITHUB_OUTPUT
        else
          echo "upstream_changed=true" >> $GITHUB_OUTPUT
        fi

    - name: Push merged changes back to your fork
      if: steps.merge.outputs.upstream_changed == 'true'
      run: git push origin main

    ###########################################################################
    # Detect upstream Dockerfile changes and send Pushover alert with diff
    ###########################################################################

    - name: Check if upstream Dockerfile changed
      id: dockerfile_check
      run: |
        git show upstream/main:Dockerfile > /tmp/upstream_dockerfile || echo "no upstream Dockerfile"

        if ! diff -q Dockerfile /tmp/upstream_dockerfile >/dev/null 2>&1; then
          echo "changed=true" >> $GITHUB_OUTPUT

          diff -u Dockerfile /tmp/upstream_dockerfile > /tmp/dockerfile.diff || true
          base64 /tmp/dockerfile.diff | tr -d '\n' > /tmp/dockerfile.b64

          echo "diff_output=$(cat /tmp/dockerfile.b64)" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Send Pushover alert if Dockerfile changed
      if: steps.dockerfile_check.outputs.changed == 'true'
      run: |
        echo "${{ steps.dockerfile_check.outputs.diff_output }}" | base64 --decode > /tmp/diff.txt
        ENCODED_MSG=$(sed ':a;N;$!ba;s/\n/%0A/g' /tmp/diff.txt)

        curl -s \
          -F "token=${{ secrets.PUSHOVER_TOKEN }}" \
          -F "user=${{ secrets.PUSHOVER_USER }}" \
          -F "message=Upstream Dockerfile changed in Huntarr-2.%0AReview differences:%0A${ENCODED_MSG}" \
          https://api.pushover.net/1/messages.json

    ###########################################################################
    # Detect upstream README.md changes and send Pushover alert with diff
    ###########################################################################

    - name: Check if upstream README changed
      id: readme_check
      run: |
        git show upstream/main:README.md > /tmp/upstream_readme || echo "no upstream README"

        if ! diff -q README.md /tmp/upstream_readme >/dev/null 2>&1; then
          echo "changed=true" >> $GITHUB_OUTPUT

          diff -u README.md /tmp/upstream_readme > /tmp/readme.diff || true
          base64 /tmp/readme.diff | tr -d '\n' > /tmp/readme.b64

          echo "diff_output=$(cat /tmp/readme.b64)" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Send Pushover alert if README changed
      if: steps.readme_check.outputs.changed == 'true'
      run: |
        echo "${{ steps.readme_check.outputs.diff_output }}" | base64 --decode > /tmp/diff.txt
        ENCODED_MSG=$(sed ':a;N;$!ba;s/\n/%0A/g' /tmp/diff.txt)

        curl -s \
          -F "token=${{ secrets.PUSHOVER_TOKEN }}" \
          -F "user=${{ secrets.PUSHOVER_USER }}" \
          -F "message=Upstream README.md changed in Huntarr-2.%0AReview differences:%0A${ENCODED_MSG}" \
          https://api.pushover.net/1/messages.json

    ###########################################################################
    # Continue with your existing base-image digest logic
    ###########################################################################

    - name: Check base image digest
      id: base
      run: |
        BASE_IMAGE=$(grep -i '^FROM ' Dockerfile | awk '{print $2}')
        DIGEST=$(docker pull $BASE_IMAGE | grep "Digest:" | awk '{print $2}')
        echo "digest=$DIGEST" >> $GITHUB_OUTPUT

        if [ -f .base-image-digest ]; then
          OLD_DIGEST=$(cat .base-image-digest)
        else
          OLD_DIGEST=""
        fi

        if [ "$DIGEST" != "$OLD_DIGEST" ]; then
          echo "base_changed=true" >> $GITHUB_OUTPUT
        else
          echo "base_changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Update stored base image digest
      if: steps.base.outputs.base_changed == 'true'
      run: |
        echo "${{ steps.base.outputs.digest }}" > .base-image-digest
        git add .base-image-digest
        git commit -m "Update base image digest"
        git push origin main

    - name: Set up QEMU
      if: steps.merge.outputs.upstream_changed == 'true' || steps.base.outputs.base_changed == 'true'
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      if: steps.merge.outputs.upstream_changed == 'true' || steps.base.outputs.base_changed == 'true'
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      if: steps.merge.outputs.upstream_changed == 'true' || steps.base.outputs.base_changed == 'true'
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: dskmnky
        password: ${{ secrets.GHCR_PAT }}

    - name: Build and push multi-arch image
      if: steps.merge.outputs.upstream_changed == 'true' || steps.base.outputs.base_changed == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ghcr.io/dskmnky/huntarr-2:latest
